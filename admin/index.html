<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>CourierMap Admin</title>
<style>
  :root {
    --bg:#f6f7f9; --card:#fff; --text:#14181d; --muted:#67707b; --line:#e3e6ea; --accent:#2563eb; --danger:#dc2626;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#101418; --card:#1a2027; --text:#e8eaed; --muted:#98a2ad; --line:#2a323c; --accent:#60a5fa; --danger:#f87171;
    }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
         font:15px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  #login { max-width:340px; margin:12vh auto 0; padding:0 16px; }
  h1 { font-size:18px; }
  input { width:100%; font:inherit; padding:9px 11px; margin-bottom:10px; border-radius:8px;
          border:1px solid var(--line); background:var(--card); color:var(--text); }
  button { width:100%; font:inherit; border:1px solid var(--accent); background:var(--accent);
           color:#fff; border-radius:8px; padding:9px 12px; cursor:pointer; margin-bottom:8px; }
  button.secondary { background:var(--card); color:var(--text); border-color:var(--line); }
  button.secondary:hover { border-color:var(--accent); }
  .err { color:var(--danger); font-size:13px; margin:6px 0; min-height:18px; }
</style>
</head>
<body>
<div id="login">
  <h1>CourierMap Admin</h1>
  <form id="loginForm">
    <input id="email" type="email" placeholder="Email" autocomplete="username" required>
    <input id="password" type="password" placeholder="Password" autocomplete="current-password" required>
    <div id="loginErr" class="err"></div>
    <button type="submit">Sign in</button>
  </form>
  <button id="googleBtn" class="secondary" type="button">Continue with Google</button>
</div>
<script>
"use strict";
(function () {
  const APP = "/api/admin/app";
  const err = document.getElementById("loginErr");
  const q = new URLSearchParams(location.search).get("err");
  if (q === "forbidden") err.textContent = "Not an admin";
  else if (q) err.textContent = q;

  // Already signed in (cookie) → dashboard lives on the Worker, not Pages.
  fetch("/api/admin", {
    method: "POST",
    credentials: "include",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "me" }),
  }).then((r) => { if (r.ok) location.replace(APP); }).catch(() => {});

  document.getElementById("googleBtn").addEventListener("click", () => {
    location.href = "/api/admin/oauth/google";
  });

  document.getElementById("loginForm").addEventListener("submit", async (ev) => {
    ev.preventDefault();
    err.textContent = "";
    try {
      const res = await fetch("/api/admin", {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "login",
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value,
        }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        err.textContent = data.error === "invalid_credentials"
          ? "Invalid email or password"
          : (data.error === "forbidden" ? "Not an admin" : (data.error || "Sign-in failed"));
        return;
      }
      location.replace(APP);
    } catch (e) {
      err.textContent = e.message || "Sign-in failed";
    }
  });
})();
</script>
</body>
</html>
